spring:
  datasource:
    url: jdbc:mysql://mysql:3306/YSCI_db?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

afetch:
  jwt:
    secret: ${JWT_SECRET}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
  gcs:
    bucket: ${GCS_BUCKET:}
    enabled: ${GCS_ENABLED:false}
