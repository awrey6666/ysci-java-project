spring:
  datasource:
    url: jdbc:mysql://mysql:3306/YSCI_db?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

afetch:
  jwt:
    secret: ${JWT_SECRET}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openai/gpt-4.1-mini}
  gcs:
    project-id: ${GCS_PROJECT_ID:project-a4b9287b-070f-4f18-b48}
    bucket: ${GCS_BUCKET:java_project_bucket}
