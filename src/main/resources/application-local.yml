spring:
  datasource:
    url: jdbc:h2:mem:ysci;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

afetch:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-256-bits-long-for-dev}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openai/gpt-4.1-mini}
  gcs:
    project-id: ${GCS_PROJECT_ID:project-a4b9287b-070f-4f18-b48}
    bucket: ${GCS_BUCKET:java_project_bucket}
