<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>a fetch — Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <h1>Welcome to a fetch</h1>
    <p th:text="'Hello, ' + ${username} + '!'">Hello!</p>
    <p>Yerevan State College of Informatics social platform.</p>
    <ul class="feature-links">
        <li><a href="/feed">Anonymous feed & reactions</a></li>
        <li><a href="/chats">Builtin & friend chats</a></li>
        <li><a href="/assistant">AI coding assistant</a></li>
        <li><a href="/profile">Your profile</a></li>
        <li><a href="/users/search">Find friends</a></li>
    </ul>
</main>
<script src="/js/auth.js"></script>
<script>
    if (!getToken()) window.location.href = '/login';
    document.getElementById('logout-btn').addEventListener('click', logoutUser);
</script>
</body>
</html>
