<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a fetch — Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<header>
    <div class="header_logo"><h1>a fetch</h1></div>
</header>
<main>
    <div class="form_container">
        <form id="register-form">
            <h1>Create account</h1>
            <input type="text" name="username" placeholder="Username" minlength="3" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" minlength="8" required>
            <p id="register-error" class="error hidden"></p>
            <button type="submit">Register</button>
            <h4>Already have an account? <a href="/login">Login</a></h4>
        </form>
    </div>
</main>
<script src="/js/auth.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        try {
            await registerUser(fd.get('username'), fd.get('email'), fd.get('password'));
            window.location.href = '/home';
        } catch (err) {
            const el = document.getElementById('register-error');
            el.textContent = 'Registration failed';
            el.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
