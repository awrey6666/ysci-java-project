spring:
  application:
    name: FETCH

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

afetch:
  jwt:
    secret: ${JWT_SECRET}

    access-expiration-minutes: 15
    refresh-expiration-days: 30

  refresh-cookie-name: afetch_refresh

  openrouter:
    api-key: ${OPENROUTER_API_KEY}
    model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
    base-url: https://openrouter.ai/api/v1

  gcs:
    bucket: ${GCS_BUCKET}
    enabled: ${GCS_ENABLED:false}

  local-upload-dir: ${LOCAL_UPLOAD_DIR:uploads}
    project-id: ${GCS_PROJECT_ID:project-a4b9287b-070f-4f18-b48}
    bucket: ${GCS_BUCKET:java_project_bucket}

gcp:
  project-id: ${GCS_PROJECT_ID:project-a4b9287b-070f-4f18-b48}
  storage:
    bucket: ${GCS_BUCKET:java_project_bucket}

